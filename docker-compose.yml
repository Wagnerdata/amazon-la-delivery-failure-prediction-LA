version: "3.9"

services:

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build: .
    command: uvicorn api.main:app --host 0.0.0.0 --port 8002 --reload
    ports:
      - "8002:8002"
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
    volumes:
      - models_data:/app/artifacts
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    restart: unless-stopped

  dashboard:
    build: .
    command: >
      streamlit run dashboard/dashboard.py
      --server.port=8503
      --server.address=0.0.0.0
      --server.headless=true
    ports:
      - "8503:8503"
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
    volumes:
      - models_data:/app/artifacts
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8503/_stcore/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    restart: unless-stopped

volumes:
  models_data:
  redis_data:
